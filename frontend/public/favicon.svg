<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="90" cy="90" r="85" fill="url(#grad1)"/>
  
  <!-- Central circle with gradient -->
  <circle cx="90" cy="90" r="75" fill="#ffffff" opacity="0.95"/>
  
  <!-- Icon: Two connected nodes representing collaboration -->
  <g transform="translate(90, 90)">
    <!-- Left circle (node) -->
    <circle cx="-20" cy="0" r="14" fill="#2563eb"/>
    
    <!-- Right circle (node) -->
    <circle cx="20" cy="0" r="14" fill="#7c3aed"/>
    
    <!-- Connection line -->
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#3b82f6" stroke-width="3"/>
    
    <!-- Top connection circle -->
    <circle cx="0" cy="-18" r="10" fill="#06b6d4"/>
    
    <!-- Connection lines to top -->
    <line x1="-15" y1="-5" x2="-5" y2="-15" stroke="#0ea5e9" stroke-width="2"/>
    <line x1="15" y1="-5" x2="5" y2="-15" stroke="#0ea5e9" stroke-width="2"/>
    
    <!-- Sparkle accent -->
    <circle cx="0" cy="0" r="2" fill="#fbbf24" opacity="0.8"/>
  </g>
</svg>
